# A 'specific' Stackage snapshot or a compiler version.
# A snapshot resolver dictates the compiler version and the set of packages
# to be used for project dependencies. For example:
#
# snapshot: lts-23.24
# snapshot: nightly-2025-06-15
# snapshot: ghc-9.8.4
#
# The location of a snapshot can be provided as a file or url. Stack assumes
# a snapshot provided as a file might change, whereas a url resource does not.
#
# snapshot: ./custom-snapshot.yaml
# snapshot: https://example.com/snapshots/2024-01-01.yaml
snapshot:
  url: https://raw.githubusercontent.com/commercialhaskell/stackage-snapshots/master/lts/24/36.yaml

# Nix integration. Stack auto-detects NixOS and uses a minimal default
# package list (haskell.compiler.ghc9103 + git + gcc + gmp). We override
# that here to also bring in SDL2 and pkg-config so proteaaudio-sdl can
# find libSDL2 at build time. Keep the defaults alongside our additions.
nix:
  enable: true
  packages:
    - haskell.compiler.ghc9103
    - git
    - gcc
    - gmp
    - SDL2
    - pkg-config
    # Milestone 14: http-tower-hs pulls in http-client, which pulls
    # in zlib (Haskell binding to libz). The Haskell package needs
    # libz.so at link time, so make it available via nix-shell.
    - zlib

# Extra dependencies not in the LTS snapshot.
extra-deps:
  - proteaaudio-0.10.1
  - proteaaudio-sdl-0.10.1
  # Milestone 14: Game.AI.Client is built on http-tower-hs for
  # retry / timeout middleware. The package is published on Hackage
  # but is not yet part of the LTS 24 Stackage snapshot, so stack
  # needs an explicit version pin here. Ditto for its transitive
  # deps that also aren't in the snapshot (tower-hs,
  # hs-opentelemetry-api, thread-utils-context).
  - http-tower-hs-0.3.1.0
  - tower-hs-0.3.0.1
  - hs-opentelemetry-api-0.3.1.0
  - thread-utils-context-0.3.0.4
  - thread-utils-finalizers-0.1.1.0

# proteaaudio / proteaaudio-sdl 0.10.1 caps bytestring at <0.12, but
# LTS 24 ships bytestring 0.12.2.0. Bump just those two packages.
allow-newer: true
allow-newer-deps:
  - proteaaudio
  - proteaaudio-sdl

# User packages to be built.
# Various formats can be used as shown in the example below.
#
# packages:
# - some-directory
# - https://example.com/foo/bar/baz-0.0.2.tar.gz
#   subdirs:
#   - auto-update
#   - wai
packages:
- .
# Dependency packages to be pulled from upstream that are not in the snapshot.
# These entries can reference officially published versions as well as
# forks / in-progress versions pinned to a git hash. For example:
#
# extra-deps:
# - acme-missiles-0.3
